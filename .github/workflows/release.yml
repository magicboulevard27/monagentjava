name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build release artifacts
        run: mvn -B clean verify package

      - name: Build container image
        run: docker build -t monagentjava:${{ github.ref_name }} .

      - name: Upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: monagentjava-${{ github.ref_name }}
          path: target/monagentjava-0.1.0-SNAPSHOT.jar

      - name: Upload release SBOM
        uses: actions/upload-artifact@v4
        with:
          name: monagentjava-${{ github.ref_name }}-sbom
          path: target/bom*.json
