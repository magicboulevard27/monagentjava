spring:
  application:
    name: monagentjava
  profiles:
    active: local
  datasource:
    url: ${MONAGENT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monagent}
    username: ${MONAGENT_DATASOURCE_USERNAME:monagent}
    password: ${MONAGENT_DATASOURCE_PASSWORD:monagent}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    user:
      name: ${MONAGENT_BASIC_AUTH_USER:admin}
      password: ${MONAGENT_BASIC_AUTH_PASSWORD:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

monitoring:
  application-name: ${spring.application.name}
  default-timezone: UTC

monagent:
  runtime:
    timezone: ${MONAGENT_TIMEZONE:UTC}
    log-directory: ${MONAGENT_LOG_DIR:/var/log/monagent}
    data-directory: ${MONAGENT_DATA_DIR:/var/lib/monagent}
